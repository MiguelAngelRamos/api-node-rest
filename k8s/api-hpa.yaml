apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: node-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  # REGLA 1: CPU
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        # Supera el 70% de uso de CPU, se escala hacia arriba
        averageUtilization: 70
  # REGLA 2: Memoria RAM
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        # Supera el 80% de uso de RAM, se escala hacia arriba
        averageUtilization: 80
